name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs on the same branch/PR to avoid cleanup job
# from one run deleting test data needed by a concurrent run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Testes unitários (Vitest) — rápido, sem deps externas
  # ─────────────────────────────────────────────────────────────
  unit:
    name: Vitest (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ─────────────────────────────────────────────────────────────
  # Job 2: Smoke cross-browser (Chromium, WebKit, Firefox)
  # ─────────────────────────────────────────────────────────────
  smoke:
    name: Playwright (smoke público)
    runs-on: ubuntu-latest
    environment: test
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium webkit firefox --with-deps
      - name: Run smoke tests (Chromium, WebKit, Firefox)
        run: npx playwright test --project=smoke-chromium --project=smoke-webkit --project=smoke-firefox
        env:
          TEST_BASE_URL: https://booking.circlehood-tech.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke
          path: e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 3: Dashboard funcional (autenticado) — todo push e PR
  # ─────────────────────────────────────────────────────────────
  dashboard-e2e:
    name: Playwright (dashboard autenticado)
    runs-on: ubuntu-latest
    environment: test
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run dashboard authenticated tests
        run: npx playwright test --project=auth-setup --project=dashboard
        env:
          TEST_BASE_URL: https://booking.circlehood-tech.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-dashboard
          path: e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 4: API pública + ciclo do profissional — todo push e PR
  # ─────────────────────────────────────────────────────────────
  api-e2e:
    name: Playwright (API pública + ciclo profissional)
    runs-on: ubuntu-latest
    environment: test
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run API and lifecycle tests
        run: npx playwright test --project=api-tests
        env:
          TEST_BASE_URL: https://booking.circlehood-tech.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-api
          path: e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 5: Segurança (auth, autorização, injeção) — todo push e PR
  # ─────────────────────────────────────────────────────────────
  security-e2e:
    name: Playwright (segurança)
    runs-on: ubuntu-latest
    environment: test
    needs: unit
    steps:
      - uses: actions/checkout@v4
