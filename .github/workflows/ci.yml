          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-critical-idempotency
          path: e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 13: Bot Reagendamento (chama Claude)
  # Serializado após bot-e2e: ambos usam TEST.PHONE — não podem rodar em paralelo
  # ─────────────────────────────────────────────────────────────
  bot-reschedule:
    name: Playwright (reagendamento bot)
    if: vars.BOT_E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: test
    needs: [unit, bot-e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run bot reschedule tests
        run: npx playwright test --project=bot-reschedule
