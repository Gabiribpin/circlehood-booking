  # ─────────────────────────────────────────────────────────────
  # Job 14: GDPR + Páginas Legais (autenticado + público)
  # ─────────────────────────────────────────────────────────────
  gdpr-legal-e2e:
    name: Playwright (GDPR + páginas legais)
    runs-on: ubuntu-latest
    environment: test
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Obter URL do Vercel deploy
        id: vercel-url
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PROD_URL="https://booking.circlehood-tech.com"
          # On PRs, try to use the Vercel preview URL for this commit
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
            echo "Buscando preview URL para SHA $SHA..."
            PREVIEW_URL=""
            for i in $(seq 1 18); do
              DEPLOY_ID=$(gh api "repos/${{ github.repository }}/deployments?sha=$SHA&environment=Preview&per_page=5" \
                --jq '.[0].id // empty' 2>/dev/null)
              if [ -n "$DEPLOY_ID" ]; then
                CANDIDATE=$(gh api "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses" \
                  --jq '[.[] | select(.state == "success")][0].environment_url // empty' 2>/dev/null)
                if [ -n "$CANDIDATE" ]; then
                  PREVIEW_URL="$CANDIDATE"
                  echo "✅ Preview URL encontrada: $PREVIEW_URL (tentativa $i)"
                  break
                fi
              fi
              echo "⏳ Tentativa $i/18: preview deploy não pronto, aguardando 10s..."
              sleep 10
            done
            # Verify the preview URL actually serves the page
            if [ -n "$PREVIEW_URL" ]; then
              echo "Verificando se preview responde..."
              if curl -sfL --max-time 20 "$PREVIEW_URL/register" 2>/dev/null | grep -q 'noopener'; then
                echo "✅ Preview responde — usando $PREVIEW_URL"
                echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "⚠️ Preview URL não respondeu — usando produção como fallback"
            else
              echo "⚠️ Preview URL não encontrada — usando produção como fallback"
            fi
          fi
          echo "url=$PROD_URL" >> "$GITHUB_OUTPUT"
      - name: Run GDPR and legal pages tests
        run: npx playwright test --project=auth-setup --project=legal --project=gdpr
        env:
          TEST_BASE_URL: ${{ steps.vercel-url.outputs.url }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-gdpr
          path: e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 15: Bot E2E (API, chama Claude) 💰 CARO
  # Só roda se TODOS os jobs baratos passarem — economiza API calls
  # ─────────────────────────────────────────────────────────────
  bot-e2e:
    name: Playwright (bot E2E) 💰
    if: vars.BOT_E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: test
    needs:
      - unit
      - smoke
      - dashboard-e2e
      - api-e2e
      - security-e2e
      - social-login-e2e
      - user-journey-e2e
      - navigation-e2e
      - ux-e2e
      - i18n-e2e
      - notifications-e2e
      - mobile-e2e
      - critical-race
      - critical-idempotency
      - gdpr-legal-e2e
      - payment-e2e
      - timezone-dst
      - blocked-periods-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run bot E2E tests
        run: npm run test:e2e:bot
        env:
          TEST_BASE_URL: https://booking.circlehood-tech.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-bot
          path: e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Cleanup: apaga dados [E2E] do banco de testes após todos os jobs
  # Roda SEMPRE (mesmo se testes falharem) via if: always()
  # Usa o environment: test para resolver NEXT_PUBLIC_SUPABASE_URL
  # e SUPABASE_SERVICE_ROLE_KEY do banco de testes, não de produção.
  # ─────────────────────────────────────────────────────────────
  cleanup-test-db:
    name: Cleanup test database
    runs-on: ubuntu-latest
    environment: test
    if: always()
    needs:
      - smoke
      - dashboard-e2e
      - api-e2e
      - security-e2e
      - social-login-e2e
      - user-journey-e2e
      - navigation-e2e
      - ux-e2e
      - i18n-e2e
      - notifications-e2e
      - mobile-e2e
      - critical-race
      - critical-idempotency
      - gdpr-legal-e2e
      - bot-e2e
      - bot-reschedule
      - timezone-dst
      - blocked-periods-api
      - blocked-periods-bot
      - consistency-bot-page
      - payment-e2e
    steps:
      - name: Delete E2E test data via Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e

          echo "🧹 Iniciando cleanup de dados [E2E]..."

          # Agendamentos criados por testes (vários padrões de client_name)
          BOOKINGS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "${SUPABASE_URL}/rest/v1/bookings?or=(client_name.ilike.*E2E*,client_name.ilike.*Teste*,client_name.ilike.*Race*,client_name.ilike.*Lifecycle*,client_name.ilike.*Chegou*,client_name.ilike.*Idempot*,client_name.ilike.*Concurrent*,client_name.ilike.*Observability*)" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Prefer: return=minimal")
          echo "  bookings DELETE → HTTP ${BOOKINGS}"

          # Agendamentos criados por phones de teste dedicados (353800000091-099 + 353830326180)
          PHONE_BOOKINGS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "${SUPABASE_URL}/rest/v1/bookings?or=(client_phone.ilike.353800000*,client_phone.eq.353830326180,client_phone.eq.%2B353830326180)" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Prefer: return=minimal")
          echo "  bookings by phone DELETE → HTTP ${PHONE_BOOKINGS}"

          # Conversas e mensagens WhatsApp do bot (phone de teste: 353830326180)
          # Mensagens apagadas antes para evitar FK violation (sem cascade automático)
          BOT_CONV_IDS=$(curl -s \
            "${SUPABASE_URL}/rest/v1/whatsapp_conversations?select=id&customer_phone=eq.353830326180" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(','.join(r['id'] for r in d))" 2>/dev/null || echo "")
          if [ -n "$BOT_CONV_IDS" ]; then
            MSGS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "${SUPABASE_URL}/rest/v1/whatsapp_messages?conversation_id=in.(${BOT_CONV_IDS})" \
              -H "apikey: ${SERVICE_KEY}" \
              -H "Authorization: Bearer ${SERVICE_KEY}" \
              -H "Prefer: return=minimal")
            echo "  whatsapp_messages DELETE → HTTP ${MSGS}"
            WCONV=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "${SUPABASE_URL}/rest/v1/whatsapp_conversations?customer_phone=eq.353830326180" \
              -H "apikey: ${SERVICE_KEY}" \
              -H "Authorization: Bearer ${SERVICE_KEY}" \
              -H "Prefer: return=minimal")
            echo "  whatsapp_conversations DELETE → HTTP ${WCONV}"
          else
            echo "  whatsapp: nenhuma conversa de teste encontrada"
          fi

          # Serviços marcados com [E2E] no nome (%5B = '[', %5D = ']')
          SERVICES=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "${SUPABASE_URL}/rest/v1/services?name=ilike.*%5BE2E%5D*" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Prefer: return=minimal")
          echo "  services DELETE → HTTP ${SERVICES}"

          # Contatos criados por testes (name contém E2E)
          CONTACTS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "${SUPABASE_URL}/rest/v1/contacts?name=ilike.*E2E*" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Prefer: return=minimal")
          echo "  contacts DELETE → HTTP ${CONTACTS}"

          echo "✅ Cleanup concluído"

