          path: e2e-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 19: Pagamentos (Stripe deposit flow) — todo push e PR
  # Testes com STRIPE real são protegidos por test.skip — job sempre verde
  # ─────────────────────────────────────────────────────────────
  payment-e2e:
    name: Playwright (pagamentos / sinal)
    runs-on: ubuntu-latest
    environment: test
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run payment tests
        run: npx playwright test --project=payment
        env:
          TEST_BASE_URL: https://booking.circlehood-tech.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - uses: actions/upload-artifact@v4
